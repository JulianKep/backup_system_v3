<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tauri App</title>
    <script type="module" src="/main.js" defer></script>
  </head>

  <body>
    <div id="root-div">
      <div id="left-div">
        <button id="backup-jetzt" class="sidebar-button">
          <img src="assets/play.png" class="button-icons" />
          <p class="text">Backup jetzt durchführen</p>
        </button>

        <div id="divider"></div>

        <button id="pick-src" class="sidebar-button">
          <img src="assets/folderr.png" class="button-icons" />
          <p class="text">Quell-Ordner auswählen</p>
        </button>

        <button id="pick-dst" class="sidebar-button">
          <img src="assets/drive.png" class="button-icons" />
          <p class="text">Backup-Ordner auswählen</p>
        </button>

        <button id="see-folders" class="sidebar-button">
          <img src="assets/question.png" class="button-icons" />
          <p class="text">Ordner anzeigen</p>
        </button>


      </div>
      <div id="right-div">
          <p id="output" class="text"></p>


          <div id="spinner"></div>


      </div>
    </div>
  </body>
</html>
